<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noly - Tab Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img class="log-img" src="icons/app-icon.png" alt="Noly Logo">
            </div>
            <button class="add-tab-btn">ADD TAB</button>
        </header>

        <section class="input-section">
            <div class="input-group">
                <label>TITLE</label>
                <input type="text" id="titleInput" placeholder="Enter title...">
            </div>
            <div class="input-group">
                <label>DESCRIPTION</label>
                <input type="text" id="descInput" placeholder="Enter description...">
            </div>
        </section>

        <main class="saved-tabs-section">
            <div class="list-header">
                <h2>SAVED TABS</h2>
                <div class="search-bar">
                    <input type="text" placeholder="Search">
                    <span class="search-icon">🔍</span>
                </div>
            </div>
            <div class="saved-tabs">
                <div class="tab-list">
                </div>
            </div>
            
        </main>
    </div>
    <script src="index.js"></script>
</body>
</html>
